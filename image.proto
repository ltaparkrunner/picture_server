//    string fileName = 1;    // Имя файла в Minio
//    string fileId = 2;     // ID документа в MongoDB
//    string userLogin = 3;      // ID пользователя для проверки прав
//    string bucketName = 4;  // Имя корзины (bucket)
//}

message DeleteFileRequest {
    string fileName = 1;    // Имя файла в Minio
    string mongoId = 2;     // ID документа в MongoDB
    string userLogin = 3;      // ID пользователя для проверки прав
    string bucketName = 4;  // Имя корзины (bucket)
}

message DeleteFolderRequest {
    string folderName = 1;    // Имя файла в Minio
    string fileId = 2;     // ID документа в MongoDB
    string userLogin = 3;      // ID пользователя для проверки прав
    string bucketName = 4;  // Имя корзины (bucket)
}

message DeleteBucketRequest {
    string bucketName = 1;
}

message BaseMessage {
  oneof content {
    Picture pict = 1;
    AddFileRequest addFile = 2;
    AddFolderRequest addFolder = 3;
    ServerResponse serverResp = 4;
    FilesFoldersListRequest listRequest = 5;
    FilesOnlyListRequest filesListRequest = 6;
    FileInfo fileInfo = 7;
    FolderInfo folderInfo = 8;
    FilesFoldersListResponse listResponse = 9;
    FilesOnlyListResponse filesListResponse = 10;
    BucketsRequest reqUserBuckets = 11;
    BucketInfo bucketInfo = 12;
    BucketsList buckets = 13;
    DeleteFileRequest deleteFile = 14;
    DeleteFolderRequest deleteFolder = 15;
    DeleteBucketRequest deleteBucket = 16;
  }
}
