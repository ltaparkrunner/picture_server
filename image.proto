syntax = "proto3";

message Picture {
  string emailLogin = 1;
  string contentType = 2;
  bytes data = 3;
  string filename = 4;
  int64 timestamp = 5;
}

message ImageListRequest {
  int32 count = 1; // Запрашиваем 6
  string bucketName = 2;
}

message ImageInfo {
  string filename = 1;
  string url = 2;
}

message ImageListResponse {
  repeated ImageInfo images = 1;
}

message BucketRequest {
  string userId = 1; // Запрашиваем бакеты конкретного пользователя
}

message BucketInfo {
  string bucketName = 1;
  string url = 2;
}

message BucketList {
  repeated BucketInfo bucketInf = 1;
}

message BaseMessage {
    // Внутри 'content' может быть ЛИБО upload, ЛИБО list_request
    oneof content {
        Picture pict = 1;
        ImageListRequest listRequest = 2;
        ImageInfo info = 3;
        ImageListResponse listResponse = 4;
        BucketRequest user = 5;
        BucketList buckets = 6;
    }
}
