syntax = "proto3";


message Picture {
  string fileName = 1;    // Имя файла в Minio
  string folderId = 2;     // ID документа в MongoDB
  string userLogin = 3;      // ID пользователя для проверки прав
  string bucketName = 4;  // Имя корзины (bucket)
  string contentType = 5;
  bytes data = 6;
  int64 timestamp = 7;
}

message AddFileRequest{
  string fileName = 1;    // Имя файла в Minio
  string userLogin = 2;      // ID пользователя для проверки прав
  string bucketName = 3;  // Имя корзины (bucket)
  string folder = 4;
  string info = 5;
  bytes data = 6;
}

message AddFolderRequest{
  string folderName = 1;    // Имя папки в Minio
  string userLogin = 2;      // ID пользователя для проверки прав
  string bucketName = 3;  // Имя корзины (bucket)
  string folder = 4;
  string info = 5;
}

message ServerResponse{ // to AddFileFolderRequest
  string content = 1;
  string status = 2; 
  string fileId = 3;
  string fileName = 4;
}

message FilesFoldersListRequest {
  string bucketName = 1;
  string folderName = 2;
  string userLogin = 3;
}

message FileInfo {
  string fileName = 1;
  string url = 2;
  int64 size = 3;
}

message FolderInfo {
  string folderName = 1;
  string url = 2;
}

message FilesFoldersListResponse {
  repeated FileInfo files = 1;
  repeated FolderInfo folders = 2;
}

message BucketsRequest {
  string userLogin = 1; // Запрашиваем бакеты конкретного пользователя
}

message BucketInfo {
  string bucketName = 1;
  string url = 2;
}

message BucketsList {                 // respond to BucketsRequest
  repeated BucketInfo bucketInf = 1;
}

message DeleteFileRequest {
    string fileName = 1;    // Имя файла в Minio
    string fileId = 2;     // ID документа в MongoDB
    string userLogin = 3;      // ID пользователя для проверки прав
    string bucketName = 4;  // Имя корзины (bucket)
}

message DeleteFolderRequest {
    string folderName = 1;    // Имя файла в Minio
    string fileId = 2;     // ID документа в MongoDB
    string userLogin = 3;      // ID пользователя для проверки прав
    string bucketName = 4;  // Имя корзины (bucket)
}

message BaseMessage {
    // Внутри 'content' может быть ЛИБО upload, ЛИБО list_request
    oneof content {
        Picture pict = 1;
        AddFileRequest addFile = 2;
        AddFolderRequest addFolder = 3;
        ServerResponse serverResp = 4;
        FilesFoldersListRequest listRequest = 5;
        FileInfo fileInfo = 6;
        FolderInfo folderInfo = 7;
        FilesFoldersListResponse listResponse = 8;
        BucketsRequest reqUserBuckets = 9;
        BucketInfo bucketInfo = 10;
        BucketsList buckets = 11;
        DeleteFileRequest deleteFile = 12;
        DeleteFolderRequest deleteFolder = 13;
    }
}
