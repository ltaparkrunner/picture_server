message Picture {
  string filename = 1;    // Имя файла в Minio
  string imageId = 2;     // ID документа в MongoDB
  string userLogin = 3;      // ID пользователя для проверки прав
  string bucketName = 4;  // Имя корзины (bucket)
  string contentType = 5;
  bytes data = 6;
  int64 timestamp = 7;
}

message AddImageRequest{
  string filename = 1;    // Имя файла в Minio
  string userLogin = 2;      // ID пользователя для проверки прав
  string bucketName = 3;  // Имя корзины (bucket)
  string folder = 4;
  string info = 5;
  bytes data = 6;
}

message ServerResponse{
  string content = 1;
  string status = 2; 
  string imageId = 3;
  string filename = 4;
}

message ImageListRequest {
  int32 count = 1; // Запрашиваем 6
  string bucketName = 2;
}

message ImageInfo {
  string filename = 1;
  string url = 2;
}

message ImageListResponse {
  repeated ImageInfo images = 1;
}

message BucketRequest {
  string userLogin = 1; // Запрашиваем бакеты конкретного пользователя
}

message BucketInfo {
  string bucketName = 1;
  string url = 2;
}

message BucketList {
  repeated BucketInfo bucketInf = 1;
}

message DeleteImageRequest {
    string filename = 1;    // Имя файла в Minio
    string imageId = 2;     // ID документа в MongoDB
    string userLogin = 3;      // ID пользователя для проверки прав
    string bucketName = 4;  // Имя корзины (bucket)
}

message BaseMessage {
    // Внутри 'content' может быть ЛИБО upload, ЛИБО list_request
    oneof content {
        Picture pict = 1;
        ImageListRequest listRequest = 2;
        ImageInfo info = 3;
        ImageListResponse listResponse = 4;
        BucketRequest reqUserBuckets = 5;
        BucketList buckets = 6;
        DeleteImageRequest deleteImage = 7;
        AddImageRequest addImage = 8;
        ServerResponse serverResp = 9;
    }
}
