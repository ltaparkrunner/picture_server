syntax = "proto3";


message Picture {
  string fileName = 1;    // Имя файла в Minio
  string folderId = 2;     // ID документа в MongoDB
//  string userLogin = 3;      // ID пользователя для проверки прав
//  string bucketName = 4;  // Имя корзины (bucket)
  string contentType = 3;
  bytes data = 4;
  int64 timestamp = 5;
}

message AddFileRequest{
  string fileName = 1;    // Имя файла в Minio
//  string userLogin = 2;      // ID пользователя для проверки прав
//  string bucketName = 3;  // Имя корзины (bucket)
  string folder = 2;
  string info = 3;
  bytes data = 4;
}

message AddFolderRequest{
  string folderName = 1;    // Имя папки в Minio
//  string userLogin = 2;      // ID пользователя для проверки прав
//  string bucketName = 3;  // Имя корзины (bucket)
  string folder = 2;
  string info = 3;
}

message ServerResponse{ // to AddFileFolderRequest
  string content = 1;
  string status = 2; 
}

message FilesIds{
    repeated string mongoIds = 1;
}

message FilesFoldersListRequest {
//  string bucketName = 1;
  string folderName = 1;
//  string userLogin = 3;
}

message FilesOnlyListRequest {
//  string bucketName = 1;
  string folderName = 1;
//  string userLogin = 3;
}

message FileInfo {
  string fileName = 1;
  string mongoId = 2;
  string url = 3;
  int64 size = 4;
}

message PathInfoRequest {
    string path = 1;
}

message PathInfoResponse {
    string path = 1;
    string netStorePath = 2;
    string result = 3;
}

message FolderInfo {
  string folderName = 1;
  string url = 2;
}

message FilesFoldersListResponse {
  repeated FileInfo files = 1;
  repeated FolderInfo folders = 2;
}

message FilesOnlyListResponse {
  repeated FileInfo files = 1;
}

message BucketsRequest {
  string userLogin = 1; // Запрашиваем бакеты конкретного пользователя
}

message BucketInfo {
  string bucketName = 1;
  string url = 2;
}

message BucketsList {                 // respond to BucketsRequest
  repeated BucketInfo bucketInf = 1;
}

message DeleteFileRequest {
    string fileName = 1;    // Имя файла в Minio
    string mongoId = 2;     // ID документа в MongoDB
//    string userLogin = 3;      // ID пользователя для проверки прав
//    string bucketName = 4;  // Имя корзины (bucket)
}

message DeleteFolderRequest {
    string folderName = 1;    // Имя файла в Minio
    string fileId = 2;     // ID документа в MongoDB
//    string userLogin = 3;      // ID пользователя для проверки прав
//    string bucketName = 4;  // Имя корзины (bucket)
}

message DeleteBucketRequest {
    string bucketName = 1;
}

message RegisterRequest {
  string userLogin = 1;
  string password = 2;
  string full_name = 3; // Доп. поле только для регистрации
}

message AuthRequest {
  string userLogin = 1;
  string password = 2;
}

message AuthResponse {
  string token = 1;
  string error = 2;
}

message BaseMessage {
  oneof content {
    Picture empty = 1;
    AddFileRequest addFile = 2;
    AddFolderRequest addFolder = 3;
    ServerResponse serverResp = 4;
    FilesFoldersListRequest listRequest = 5;
    FilesOnlyListRequest filesListRequest = 6;
    FileInfo fileInfo = 7;
    FolderInfo folderInfo = 8;
    FilesFoldersListResponse listResponse = 9;
    FilesOnlyListResponse filesListResponse = 10;
    BucketsRequest reqUserBuckets = 11;
    BucketInfo bucketInfo = 12;
    BucketsList buckets = 13;
    DeleteFileRequest deleteFile = 14;
    DeleteFolderRequest deleteFolder = 15;
    DeleteBucketRequest deleteBucket = 16;
    RegisterRequest regRequest = 17;
    AuthRequest authRequest = 18;
    AuthResponse authResponse = 19;
  }
}

// For messages traveling: Client -> Server
message ClientEnvelope {
  enum Type {
    UNKNOWN = 0;
    AUTH_REQUEST = 1;
    CLIENT_MESSAGE = 2;
  }
  Type type = 1;
  string token = 14;
  oneof content {
    AddFileRequest addFile = 2;
    AddFolderRequest addFolder = 3;
    FilesFoldersListRequest listRequest = 4;
    FilesOnlyListRequest filesListRequest = 5;
    FilesIds filesIdsRequest = 6;
    PathInfoRequest pathInfRequest = 7;
    BucketsRequest reqUserBuckets = 8;
    DeleteFileRequest deleteFile = 9;
    DeleteFolderRequest deleteFolder = 10;
    DeleteBucketRequest deleteBucket = 11;
    RegisterRequest regRequest = 12;
    AuthRequest authRequest = 13;
  }
}

// For messages traveling: Server -> Client
message ServerEnvelope {
  enum Type {
    UNKNOWN = 0;
    AUTH_RESPONSE = 1;
    SERVER_MESSAGE = 2;
  }
  Type type = 1;
  oneof content {
    ServerResponse serverResp = 2;
    FileInfo fileInfo = 3;
    FolderInfo folderInfo = 4;
    FilesFoldersListResponse listResponse = 5;
    FilesOnlyListResponse filesListResponse = 6;
    BucketInfo bucketInfo = 7;
    BucketsList buckets = 8;
    AuthResponse authResponse = 9;
    FilesOnlyListResponse filesIdsResponse = 10;
    PathInfoResponse pathInfResponse = 11;
  }
}
