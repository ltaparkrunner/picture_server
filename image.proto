syntax = "proto3";

message Picture {
  string emailLogin = 1;
  string contenttype = 2;
  bytes data = 3;
  string filename = 4;
  int64 timestamp = 5;
}

message ImageListRequest {
  int32 count = 2; // Запрашиваем 6
}

message ImageInfo {
  string filename = 2;
  string url = 3;
}

message ImageListResponse {
  repeated ImageInfo images = 2;
}

message BaseMessage {
    // Внутри 'content' может быть ЛИБО upload, ЛИБО list_request
    oneof content {
        Picture pict = 1;
        ImageListRequest list_request = 2;
        ImageInfo info = 3;
        ImageListResponse list_response = 4;
    }
}
