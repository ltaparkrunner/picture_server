syntax = "proto3";

enum MessageType {
    PICTURE = 0;
    LIST_REQUEST = 1;
    IMAGE_INFO = 2;
    LISTRESPONSE = 3;
}

message Picture {
  MessageType type = 1;
  string email_login = 2;
  string filename = 3;
  bytes data = 4;
  string content_type = 5;
  int64 timestamp = 6;
}

message ImageListRequest {
  MessageType type = 1;
  int32 count = 2; // Запрашиваем 6
}

message ImageInfo {
  MessageType type = 1;
  string filename = 2;
  string url = 3;
}

message ImageListResponse {
  MessageType type = 1;
  repeated ImageInfo images = 2;
}
