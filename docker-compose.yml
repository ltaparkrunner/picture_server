version: '3.8'
services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - MONGO_URL=mongodb://mongo:27017/images_db
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=admin
      - S3_SECRET_KEY=password123
      - S3_BUCKET=photos
    depends_on:
      - mongo
      - minio
#    volumes:
#      - /app
#    restart: always

  mongo:
    image: mongo:latest
    volumes:
      - mongo_data:/data/db

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000" # API
      - "9001:9001" # Консоль управления (логин: admin / пароль: password123)
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
#      MINIO_SERVER_URL: "http://localhost:9000"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    # Вспомогательный сервис для автоматической настройки бакета
  # minio-init:
  #   image: minio/mc
  #   depends_on:
  #     - minio
  #   entrypoint: >
  #     /bin/sh -c "
  #     until (/usr/bin/mc alias set myminio http://minio:9000 admin password123) do echo 'Waiting for MinIO...' && sleep 1; done;
  #     /usr/bin/mc mb myminio/images || true;
  #     /usr/bin/mc anonymous set download myminio/images;
  #     exit 0;
  #     "

volumes:
  mongo_data:
  minio_data:
  